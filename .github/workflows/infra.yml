name: "AWS Infrastructure Management"

on:
  workflow_dispatch:

  schedule:
    # 平日 JST 08:50 (UTC 前日 23:50)
    - cron: '50 23 * * 0-4'

    # 平日 JST 19:05 (UTC 10:05)
    - cron: '5 10 * * 1-5'

jobs:
  terraform:
    name: "Terraform Apply or Destroy"
    runs-on: ubuntu-latest

    env:
      WORKING_DIR: "infra/environments/dev"

    outputs:
      schedule: ${{ steps.set-schedule.outputs.schedule }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Schedule
        id: set-schedule
        run: |
          echo "schedule=${{ github.event.schedule }}" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Execution
        run: |
          SCHEDULE="${{ github.event.schedule }}"

          if [[ "$SCHEDULE" == "50 23 * * 0-4" ]]; then
            echo "Weekday Morning: Running Apply"
            terraform apply -auto-approve

          elif [[ "$SCHEDULE" == "5 10 * * 1-5" ]]; then
            echo "Weekday Evening: Running Destroy"
            terraform destroy -auto-approve

          else
            echo "Manual Trigger: Temporary Destroy"
            terraform apply -auto-approve
          fi
        working-directory: ${{ env.WORKING_DIR }}

  deploy-app:
    name: "Trigger App Deployment"

    needs: terraform

    if: |
      needs.terraform.outputs.schedule == '50 23 * * 0-4' ||
      needs.terraform.outputs.schedule == ''

    uses: ./.github/workflows/deploy.yml

    secrets: inherit
